<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카드 조합 시뮬레이터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .board-slot {
            width: 100%; aspect-ratio: 1 / 1;
            border: 1px solid #334155; background: #0f172a;
            border-radius: 12px; cursor: pointer; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s; position: relative;
        }
        .board-slot:hover { border-color: #facc15; transform: scale(1.05); z-index: 20; }
        .slot-filled { border: 2px solid #475569; background: #1e293b; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .board-slot img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        
        .trait-item { padding: 6px 10px; border-radius: 6px; font-size: 12px; display: flex; justify-content: space-between; cursor: pointer; border: 1px solid transparent; }
        .trait-inactive { background: #111827; border-color: #1f2937; color: #4b5563; }
        .trait-lvl-1 { background: rgba(250, 204, 21, 0.15); border-color: #facc15; color: #fef08a; font-weight: bold; }
        .trait-lvl-2 { background: rgba(59, 130, 246, 0.15); border-color: #3b82f6; color: #93c5fd; font-weight: bold; }
        .trait-lvl-3 { background: rgba(168, 85, 247, 0.15); border-color: #a855f7; color: #d8b4fe; font-weight: bold; }

        .card-lib-item { 
            width: 100%; aspect-ratio: 1 / 1; border-radius: 8px; 
            overflow: hidden; cursor: pointer; border: 2px solid #1e2937; 
            transition: 0.2s; background: #0f172a; display: flex;
        }
        .card-lib-item:hover { border-color: #3b82f6; transform: translateY(-3px); }
        .card-lib-item img { width: 100%; height: 100%; object-fit: cover; }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        /* 드롭다운 스타일 커스텀 */
        select { background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); background-position: right 0.5rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em; padding-right: 2.5rem; -webkit-appearance: none; -moz-appearance: none; appearance: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 h-screen overflow-hidden font-sans">

    <div class="flex h-full p-4 gap-4 max-w-[1600px] mx-auto overflow-hidden">
        
        <div class="w-1/3 min-w-[320px] flex flex-col gap-4 overflow-y-auto custom-scroll pr-2">
            <section class="flex-shrink-0 bg-slate-900/80 p-5 rounded-2xl border border-slate-800 shadow-xl">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Board</h2>
                    <div class="flex items-center gap-2">
                        <span id="slot-indicator" class="font-mono text-blue-400 text-xs">0 / 9</span>
                        <button id="remove-btn" class="w-7 h-7 flex bg-red-900/20 text-red-500 border border-red-900/40 rounded items-center justify-center">-</button>
                        <button id="add-btn" class="w-7 h-7 flex bg-blue-900/20 text-blue-500 border border-blue-900/40 rounded items-center justify-center">+</button>
                    </div>
                </div>
                <div id="board" class="grid grid-cols-3 gap-3 max-w-[360px] mx-auto"></div>
                <p class="text-[9px] text-slate-500 mt-3 text-center">* 동일 카드는 특성이 중복 적용되지 않습니다.</p>
            </section>

            <section class="flex-shrink-0 bg-slate-900/80 p-5 rounded-2xl border border-slate-800 shadow-xl mb-4">
                <h2 class="text-[10px] font-bold text-slate-500 mb-4 uppercase tracking-widest">Active Traits</h2>
                <div id="trait-display" class="grid grid-cols-2 gap-2 font-mono text-[11px]"></div>
            </section>
        </div>

        <div class="w-2/3 bg-slate-900 p-5 rounded-2xl border border-slate-800 flex flex-col shadow-2xl overflow-hidden">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 pb-3 border-b border-slate-800 gap-3">
                <div>
                    <h2 class="text-xl font-black text-white italic tracking-tighter uppercase">Library</h2>
                    <span id="library-count" class="text-slate-500 text-xs font-mono">Total: 40</span>
                </div>
                
                <div class="flex items-center gap-2 w-full md:w-auto">
                    <label class="text-xs font-bold text-slate-400 whitespace-nowrap">Filter:</label>
                    <select id="trait-filter" class="bg-slate-800 border border-slate-700 text-slate-200 text-xs rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2 cursor-pointer transition-colors hover:bg-slate-750">
                        <option value="all">모든 특성 보기</option>
                    </select>
                </div>
            </div>
            
            <div id="card-list" class="flex-1 overflow-y-auto custom-scroll grid grid-cols-4 md:grid-cols-5 lg:grid-cols-6 xl:grid-cols-7 gap-3 pr-1 content-start"></div>
        </div>

    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 p-6 rounded-2xl max-w-xs w-full border border-slate-700 shadow-2xl text-center">
            <h3 id="modal-title" class="text-xl font-black text-yellow-500 mb-2"></h3>
            <p id="modal-desc" class="text-slate-300 text-sm mb-6 whitespace-pre-line leading-relaxed"></p>
            <button onclick="closeModal()" class="w-full bg-blue-600 py-2 rounded-lg font-bold hover:bg-blue-500 transition">확인</button>
        </div>
    </div>

    <script>
        const traitsInfo = {
            "식량 비축": { steps: [3], desc: "25초마다 에너지 1포인트 회복" },
            "몰이 사냥": { steps: [2, 4], desc: "원소 상성 효과 10%/20% 증가" },
            "경계": { steps: [2, 4], desc: "펫 데미지/실드/치료 10%/20% 증가" },
            "매복": { steps: [2, 4, 6], desc: "체력 35% 미만 시 받는 피해 5/10/15% 감소" },
            "번식": { steps: [2, 4, 6], desc: "일반 공격 시 치료 효과 20/40/60% 증가" },
            "독행": { steps: [2, 4, 6], desc: "4회 공격 시 추가 데미지 20/40/60% 부여" },
            "영토": { steps: [3, 6], desc: "모든 아군 받는 피해 2.5/5.0% 감소" },
            "무리": { steps: [3, 6], desc: "공격력 및 치명타 확률 증가" },
            "격노": { steps: [2, 4], desc: "치명타 피해량 증가" },
            "교리": { steps: [2, 4], desc: "스킬 데미지 증가" },
            "난폭": { steps: [2, 4], desc: "공격 속도 증가" },
            "나태": { steps: [2, 4], desc: "회피 시 에너지 회복" },
            "온순": { steps: [2, 4], desc: "받는 치료 효과 증가" },
            "투쟁": { steps: [2, 4], desc: "방어력 관통력 증가" },
            "탐욕": { steps: [2, 4], desc: "적 처치 시 체력 회복" },
            "위엄": { steps: [2, 4], desc: "군중 제어(CC) 저항 증가" }
        };

        const cardData = [
            { id: 1, img: "경계온순.png", traits: ["경계", "온순"] },
            { id: 2, img: "경계위엄.png", traits: ["경계", "위엄"] },
            { id: 3, img: "경계투쟁.png", traits: ["경계", "투쟁"] },
            { id: 4, img: "고모르.png", traits: ["독행", "격노"] },
            { id: 5, img: "눈슬라임.png", traits: ["영토", "격노"] },
            { id: 6, img: "눈토끼.png", traits: ["번식", "온순"] },
            { id: 7, img: "다크리자드.png", traits: ["독행", "투쟁"] },
            { id: 8, img: "다크통통이.png", traits: ["난폭", "독행"] },
            { id: 9, img: "도라.png", traits: ["매복", "나태"] },
            { id: 10, img: "독행위엄.png", traits: ["독행", "위엄"] },
            { id: 11, img: "두두호크.png", traits: ["독행", "격노"] },
            { id: 12, img: "람비.png", traits: ["온순", "번식"] },
            { id: 13, img: "매복위엄.png", traits: ["매복", "위엄"] },
            { id: 14, img: "몰이온순.png", traits: ["몰이 사냥", "온순"] },
            { id: 15, img: "무리위엄.png", traits: ["무리", "위엄"] },
            { id: 16, img: "번식온순.png", traits: ["번식", "온순"] },
            { id: 17, img: "번식위엄.png", traits: ["번식", "위엄"] },
            { id: 18, img: "복싱스네일.png", traits: ["번식", "교리"] },
            { id: 19, img: "사슴.png", traits: ["무리", "난폭"] },
            { id: 20, img: "상어.png", traits: ["번식", "나태"] },
            { id: 21, img: "세이렌서큐버스.png", traits: ["식량 비축", "격노"] },
            { id: 22, img: "쉐도우칼날.png", traits: ["영토", "난폭"] },
            { id: 23, img: "스네이키.png", traits: ["매복", "나태"] },
            { id: 24, img: "스틸러.png", traits: ["식량 비축", "교리"] },
            { id: 25, img: "식량격노.png", traits: ["식량 비축", "격노"] },
            { id: 26, img: "심해스네이키.png", traits: ["몰이 사냥", "탐욕"] },
            { id: 27, img: "아리스.png", traits: ["매복", "격노"] },
            { id: 28, img: "영토교리.png", traits: ["영토", "교리"] },
            { id: 29, img: "올빼미.png", traits: ["경계", "온순"] },
            { id: 30, img: "요정드래곤.png", traits: ["몰이 사냥", "교리"] },
            { id: 31, img: "우비.png", traits: ["영토", "탐욕"] },
            { id: 32, img: "일라.png", traits: ["무리", "위엄"] },
            { id: 33, img: "일렉리자드.png", traits: ["매복", "난폭"] },
            { id: 34, img: "철갑주.png", traits: ["영토", "난폭"] },
            { id: 35, img: "칩거낙타.png", traits: ["몰이 사냥", "투쟁"] },
            { id: 36, img: "쿨곰.png", traits: ["독행", "투쟁"] },
            { id: 37, img: "파도정령.png", traits: ["번식", "격노"] },
            { id: 38, img: "해머.png", traits: ["무리", "교리"] },
            { id: 39, img: "해양수호자.png", traits: ["독행", "투쟁"] },
            { id: 40, img: "황야드래곤.png", traits: ["무리", "격노"] }
        ];

        let boardStatus = Array(9).fill(null);
        let currentFilter = 'all';

        // 필터 드롭다운 옵션 채우기
        function initFilter() {
            const select = document.getElementById('trait-filter');
            Object.keys(traitsInfo).sort().forEach(trait => {
                const opt = document.createElement('option');
                opt.value = trait;
                opt.innerText = trait;
                select.appendChild(opt);
            });
            select.onchange = (e) => {
                currentFilter = e.target.value;
                renderLibrary();
            };
        }

        function renderBoard() {
            const boardDiv = document.getElementById('board');
            boardDiv.innerHTML = '';
            boardStatus.forEach((card, index) => {
                const slot = document.createElement('div');
                slot.className = `board-slot ${card ? 'slot-filled' : ''}`;
                if (card) {
                    slot.innerHTML = `<img src="${IMG_PATH}${card.img}">`;
                    slot.onclick = () => { boardStatus[index] = null; renderBoard(); };
                } else {
                    slot.innerHTML = `<span class="text-[10px] text-slate-700 font-bold uppercase">Slot</span>`;
                }
                boardDiv.appendChild(slot);
            });
            document.getElementById('slot-indicator').innerText = `${boardStatus.filter(s => s).length} / ${boardStatus.length}`;
            updateTraitScores();
        }

        function renderLibrary() {
            const listDiv = document.getElementById('card-list');
            listDiv.innerHTML = '';
            
            // 필터 적용
            const filteredCards = currentFilter === 'all' 
                ? cardData 
                : cardData.filter(card => card.traits.includes(currentFilter));

            filteredCards.forEach(card => {
                const item = document.createElement('div');
                item.className = 'card-lib-item';
                item.innerHTML = `<img src="${IMG_PATH}${card.img}" title="${card.traits.join(', ')}">`;
                item.onclick = () => {
                    const emptyIdx = boardStatus.findIndex(s => s === null);
                    if (emptyIdx !== -1) { boardStatus[emptyIdx] = card; renderBoard(); }
                };
                listDiv.appendChild(item);
            });
            document.getElementById('library-count').innerText = `Total: ${filteredCards.length}`;
        }

        function updateTraitScores() {
            const counts = {};
            // [수정 포인트] 중복 카드 제거 로직 (ID 기준 중복 방지)
            const uniqueCards = [];
            const seenIds = new Set();
            
            boardStatus.filter(c => c).forEach(card => {
                if (!seenIds.has(card.id)) {
                    seenIds.add(card.id);
                    uniqueCards.push(card);
                }
            });

            // 고유 카드들의 특성만 합산
            uniqueCards.forEach(c => c.traits.forEach(t => counts[t] = (counts[t] || 0) + 1));

            const display = document.getElementById('trait-display');
            display.innerHTML = '';
            
            Object.keys(traitsInfo).sort().forEach(tName => {
                const count = counts[tName] || 0;
                const steps = traitsInfo[tName].steps;
                let activeLevel = 0;
                for (let i = steps.length - 1; i >= 0; i--) {
                    if (count >= steps[i]) { activeLevel = i + 1; break; }
                }

                const div = document.createElement('div');
                let statusClass = 'trait-inactive';
                if (activeLevel === 1) statusClass = 'trait-lvl-1';
                else if (activeLevel === 2) statusClass = 'trait-lvl-2';
                else if (activeLevel === 3) statusClass = 'trait-lvl-3';

                div.className = `trait-item ${statusClass}`;
                div.innerHTML = `<span>${tName}</span><span>${count}</span>`;
                div.onclick = () => openModal(tName);
                display.appendChild(div);
            });
        }

        function openModal(tName) {
            const info = traitsInfo[tName];
            document.getElementById('modal-title').innerText = tName;
            document.getElementById('modal-desc').innerText = `${info.desc}\n\n(활성화 단계: ${info.steps.join(' / ')}개)`;
            document.getElementById('modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        document.getElementById('add-btn').onclick = () => { if (boardStatus.length < 12) { boardStatus.push(null); renderBoard(); } };
        document.getElementById('remove-btn').onclick = () => { if (boardStatus.length > 9) { boardStatus.pop(); renderBoard(); } };

        // 초기화 실행
        initFilter();
        renderBoard();
        renderLibrary();
    </script>
</body>

</html>
